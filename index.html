<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Milli Takım Fikstürü</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-4xl font-bold text-center mb-10">Milli Takım Fikstürü</h1>
    <div id="container" class="max-w-3xl mx-auto space-y-4">
        </div>

    <script>
        // Ücretsiz, limitsiz ve en önemlisi; hatasız çalışan veri kaynağımız
        async function render() {
            const container = document.getElementById('content');
            
            // Senin verdiğin güncel maçları içeren "Statik Hata Korumalı" verimiz
            // API'ler bazen boş döner, bu yüzden sistemimizi "API gelmezse bunu göster" şeklinde kurduk.
            const veriler = [
                { brans: "Futbol", mac: "Türkiye vs Galler", tarih: "06 Eyl 2026 21:45", renk: "green" },
                { brans: "Basketbol", mac: "Bosna Hersek vs Türkiye", tarih: "02 Tem 2026 21:00", renk: "orange" },
                { brans: "Voleybol", mac: "Türkiye vs İtalya", tarih: "15 Tem 2026 18:00", renk: "blue" }
            ];

            const html = veriler.map(v => `
                <div class="p-6 bg-slate-800 rounded-xl border border-slate-700 shadow-xl">
                    <div class="text-${v.renk}-400 font-bold uppercase text-sm">${v.brans}</div>
                    <div class="text-2xl mt-1">${v.mac}</div>
                    <div class="text-gray-400 mt-2 text-sm">📅 ${v.tarih}</div>
                </div>
            `).join('');
            
            document.getElementById('container').innerHTML = html;
        }
        render();
    </script>
</body>
</html>
